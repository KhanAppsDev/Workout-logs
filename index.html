<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge // Workout Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0b0c;
            --card-bg: #141417;
            --border: #28282c;
            --text-main: #e1e1e6;
            --text-dim: #a1a1aa;
            --accent: #3b82f6;
            --accent-dim: rgba(59, 130, 246, 0.1);
            --success: #10b981;
            --danger: #ef4444;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: var(--font); 
            line-height: 1.5;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        h2 { font-size: 1.1rem; margin-bottom: 15px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }

        textarea {
            width: 100%; height: 250px;
            background: #000; border: 1px solid var(--border);
            color: var(--text-main); border-radius: 8px;
            padding: 12px; font-family: 'Courier New', monospace;
            resize: vertical; outline: none; font-size: 0.85rem;
        }

        .btn-group { margin-top: 10px; display: flex; gap: 10px; }
        button { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--border); color: var(--text-main); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day {
            aspect-ratio: 1; border: 1px solid var(--border); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; cursor: pointer;
        }
        .cal-day.has-workout { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: bold; }

        .chart-container { height: 300px; width: 100%; }
        select { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; width: 100%; margin-bottom: 15px; }

        .stat-card { background: #1a1a1e; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; }
        .stat-val { font-size: 1.4rem; font-weight: bold; display: block; color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            padding: 12px 24px; background: var(--success); color: white; border-radius: 8px;
            transition: transform 0.3s; z-index: 1000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="container">
    <main>
        <div class="card">
            <h2>Import History or Log New</h2>
            <textarea id="logInput" placeholder="Paste your reconstructed history here..."></textarea>
            <div class="btn-group">
                <button class="btn-primary" onclick="processBulkImport()">Process All Workouts</button>
                <button class="btn-secondary" onclick="clearData()">Clear All Data</button>
            </div>
        </div>

        <div class="card">
            <h2>Progress Visualizer</h2>
            <select id="exercisePicker" onchange="updateCharts()"></select>
            <div class="chart-container">
                <canvas id="progressChart"></canvas>
            </div>
        </div>
    </main>

    <aside>
        <div class="card">
            <h2>Quick Stats</h2>
            <div class="stat-card">
                <span class="stat-label">Days Trained</span>
                <span class="stat-val" id="statTotal">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Volume (All Time)</span>
                <span class="stat-val" id="statVolume">0</span>
            </div>
        </div>

        <div class="card">
            <h2>Calendar</h2>
            <div id="calendar" class="calendar-grid"></div>
        </div>
    </aside>
</div>

<div id="toast">Data Processed!</div>

<script>
    let workoutData = JSON.parse(localStorage.getItem('forge_workouts') || '[]');
    let chartInstance = null;

    function smartParse(text) {
        const lines = text.split('\n');
        const workouts = [];
        let currentWorkout = null;

        lines.forEach(line => {
            const cleanLine = line.trim();
            if (!cleanLine || cleanLine.startsWith('---')) return;

            // Detect Date Header (## 2025-01-02)
            const dateMatch = cleanLine.match(/##\s*(\d{4}-\d{2}-\d{2})/);
            if (dateMatch) {
                if (currentWorkout) workouts.push(currentWorkout);
                currentWorkout = { date: dateMatch[1], exercises: [] };
                return;
            }

            // Detect Table/Entry Line
            // Pattern: Name | Weight | Reps or Name  Weight  Reps
            // We strip bars and extra spaces
            const parts = cleanLine.split(/[|]+/).map(p => p.trim()).filter(p => p !== "");
            
            // This regex finds numbers (weight) followed by "lb", "kg", etc.
            // And finds numbers (reps) at the end or in "10 x 3" format
            if (currentWorkout && parts.length >= 2) {
                const name = parts[0];
                const weightStr = parts[1].toLowerCase();
                const repsStr = parts[2] ? parts[2].toLowerCase() : "";

                let weight = 0;
                if (!weightStr.includes('bodyweight') && !weightStr.includes('---')) {
                    const weightMatch = weightStr.match(/(\d+\.?\d*)/);
                    if (weightMatch) weight = parseFloat(weightMatch[1]);
                }

                let sets = [];
                // Check for "10 x 3" format
                const multiSetMatch = repsStr.match(/(\d+)\s*x\s*(\d+)/);
                if (multiSetMatch) {
                    const count = parseInt(multiSetMatch[2]);
                    const reps = parseInt(multiSetMatch[1]);
                    for(let i=0; i<count; i++) sets.push({ weight, reps });
                } else {
                    const repsMatch = repsStr.match(/(\d+)/);
                    if (repsMatch) {
                        sets.push({ weight, reps: parseInt(repsMatch[1]) });
                    }
                }

                if (sets.length > 0) {
                    // Group by exercise name
                    let ex = currentWorkout.exercises.find(e => e.name === name);
                    if (ex) ex.sets.push(...sets);
                    else currentWorkout.exercises.push({ name, sets });
                }
            }
        });

        if (currentWorkout) workouts.push(currentWorkout);
        return workouts;
    }

    function processBulkImport() {
        const text = document.getElementById('logInput').value;
        const newWorkouts = smartParse(text);
        
        newWorkouts.forEach(nw => {
            workoutData = workoutData.filter(w => w.date !== nw.date);
            workoutData.push(nw);
        });

        saveAndRefresh();
        showToast(`Imported ${newWorkouts.length} days`);
    }

    function saveAndRefresh() {
        localStorage.setItem('forge_workouts', JSON.stringify(workoutData));
        renderUI();
    }

    function renderUI() {
        updateStats();
        renderCalendar();
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        cal.innerHTML = "";
        const now = new Date();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        
        for (let i = 1; i <= daysInMonth; i++) {
            const dStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const hasW = workoutData.some(w => w.date === dStr);
            const el = document.createElement('div');
            el.className = `cal-day ${hasW ? 'has-workout' : ''}`;
            el.innerText = i;
            cal.appendChild(el);
        }
    }

    function updateStats() {
        document.getElementById('statTotal').innerText = workoutData.length;
        const vol = workoutData.reduce((acc, w) => 
            acc + w.exercises.reduce((eAcc, e) => 
                eAcc + e.sets.reduce((sAcc, s) => sAcc + (s.weight * s.reps), 0), 0), 0);
        document.getElementById('statVolume').innerText = vol.toLocaleString() + ' units';

        const picker = document.getElementById('exercisePicker');
        const uniqueEx = [...new Set(workoutData.flatMap(w => w.exercises.map(e => e.name)))].sort();
        const currentSelection = picker.value;
        picker.innerHTML = uniqueEx.map(ex => `<option value="${ex}">${ex}</option>`).join('');
        if (currentSelection && uniqueEx.includes(currentSelection)) picker.value = currentSelection;
        
        updateCharts();
    }

    function updateCharts() {
        const exName = document.getElementById('exercisePicker').value;
        if (!exName) return;

        const history = workoutData
            .filter(w => w.exercises.some(e => e.name === exName))
            .sort((a,b) => new Date(a.date) - new Date(b.date));

        const labels = history.map(h => h.date);
        const weights = history.map(h => Math.max(...h.exercises.find(e => e.name === exName).sets.map(s => s.weight)));

        const ctx = document.getElementById('progressChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Top Set Weight',
                    data: weights,
                    borderColor: '#3b82f6',
                    tension: 0.2,
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.1)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { ticks: { color: '#a1a1aa' }, grid: { display: false } },
                    y: { ticks: { color: '#a1a1aa' }, grid: { color: '#28282c' } }
                }
            }
        });
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function clearData() {
        if(confirm("Delete all workout data?")) {
            workoutData = [];
            saveAndRefresh();
        }
    }

    renderUI();
</script>
</body>
</html>
