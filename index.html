<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge // Advanced Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0b0c;
            --card-bg: #141417;
            --border: #232326;
            --text: #e1e1e6;
            --dim: #a1a1aa;
            --accent: #3b82f6;
            --gold: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }

        /* Layout Architecture */
        .dashboard { display: grid; grid-template-columns: 1fr 320px; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 1000px) { .dashboard { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        h2 { font-size: 0.85rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }

        /* Collapsible Input Console */
        .console-wrap { margin-bottom: 20px; transition: all 0.3s ease; }
        .console-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--border); border-radius: 8px; font-weight: bold; }
        .console-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .console-body.open { max-height: 500px; padding-top: 15px; }

        textarea { 
            width: 100%; height: 200px; background: #000; color: #00ff41; border: 1px solid var(--border);
            padding: 12px; font-family: 'Fira Code', monospace; border-radius: 6px; font-size: 0.8rem;
        }

        /* Calendar Styling */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { 
            aspect-ratio: 1; border: 1px solid var(--border); border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; font-size: 0.75rem; 
            cursor: pointer; transition: 0.2s;
        }
        .cal-day.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 0 10px rgba(59,130,246,0.4); }
        .cal-day:hover { background: #1e1e22; }

        /* Modal Architecture */
        #modalOverlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); 
            display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal { background: var(--card-bg); width: 90%; max-width: 500px; border-radius: 16px; border: 1px solid var(--border); padding: 25px; }

        /* Charts & Selects */
        .chart-area { height: 350px; margin-top: 10px; }
        select { 
            width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); 
            color: var(--text); border-radius: 8px; margin-bottom: 10px; 
        }

        /* Buttons & Utility */
        .btn { padding: 8px 16px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .btn-prime { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--dim); }
        .btn:hover { opacity: 0.8; }
        .flex-row { display: flex; gap: 10px; }
        .stats-block { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }

        #toast { position: fixed; top: 20px; right: 20px; background: var(--accent); color: white; padding: 12px 20px; border-radius: 8px; transform: translateX(200%); transition: 0.3s; z-index: 1100; }
    </style>
</head>
<body>

<div id="toast">Log Updated</div>

<div id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()" id="modalContent"></div>
</div>

<div class="dashboard">
    <main>
        <div class="console-wrap">
            <div class="console-header" onclick="toggleConsole()">
                <span>> TERMINAL: DATA INJECTION</span>
                <span id="consoleToggle">+</span>
            </div>
            <div class="console-body" id="consoleBody">
                <textarea id="logInput" placeholder="Paste workout chunks here... (Format: ## YYYY-MM-DD followed by exercises)"></textarea>
                <div class="flex-row" style="margin-top:10px;">
                    <button class="btn btn-prime" onclick="processData()">Parse & Merge</button>
                    <button class="btn btn-ghost" onclick="toggleConsole()">Cancel</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>
                Progress Explorer 
                <span id="prBadge" style="color:var(--gold); display:none;">🏆 PERSONAL RECORD</span>
            </h2>
            <select id="exSelect" onchange="refreshChart()"></select>
            <div class="chart-area">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </main>

    <aside>
        <div class="card">
            <h2>Calendar View</h2>
            <div id="calendar" class="calendar-grid"></div>
        </div>

        <div class="card">
            <h2>System Controls</h2>
            <div class="flex-row">
                <button class="btn btn-ghost" style="flex:1" onclick="exportJSON()">Export</button>
                <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('fileInput').click()">Import</button>
            </div>
            <input type="file" id="fileInput" hidden onchange="importJSON(event)">
            
            <div class="stats-block">
                <div style="font-size:0.7rem; color:var(--dim)">TOTAL LOGS</div>
                <div id="statTotal" style="font-size:1.5rem; font-weight:bold">0</div>
            </div>
        </div>
    </aside>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('forge_db') || '[]');
    let chartObj = null;

    // --- Core Logic ---
    function processData() {
        const text = document.getElementById('logInput').value;
        const entries = text.split(/##\s+/).filter(e => e.trim());
        
        entries.forEach(entry => {
            const lines = entry.split('\n');
            const dateMatch = lines[0].match(/(\d{4}-\d{2}-\d{2})/);
            if (!dateMatch) return;

            const date = dateMatch[1];
            const workout = { date, exercises: [] };
            
            lines.slice(1).forEach(line => {
                const parts = line.split(/[|]+/).map(p => p.trim()).filter(p => p);
                if (parts.length >= 2) {
                    const weightMatch = parts[1].match(/(\d+\.?\d*)/);
                    const repsMatch = parts[2] ? parts[2].match(/(\d+)/) : null;
                    
                    if (weightMatch && repsMatch) {
                        const exName = parts[0];
                        let ex = workout.exercises.find(e => e.name === exName);
                        if (!ex) {
                            ex = { name: exName, sets: [] };
                            workout.exercises.push(ex);
                        }
                        ex.sets.push({ weight: parseFloat(weightMatch[1]), reps: parseInt(repsMatch[1]) });
                    }
                }
            });

            if (workout.exercises.length > 0) {
                logs = logs.filter(l => l.date !== date); // Overwrite/Merge
                logs.push(workout);
            }
        });

        save();
        toggleConsole();
        document.getElementById('logInput').value = '';
        triggerToast("Data Merged Successfully");
    }

    function save() {
        localStorage.setItem('forge_db', JSON.stringify(logs));
        init();
    }

    // --- UI Logic ---
    function init() {
        renderCalendar();
        populatePicker();
        document.getElementById('statTotal').innerText = logs.length;
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        cal.innerHTML = '';
        const now = new Date();
        const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        
        for (let i = 1; i <= days; i++) {
            const dStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const log = logs.find(l => l.date === dStr);
            const day = document.createElement('div');
            day.className = `cal-day ${log ? 'active' : ''}`;
            day.innerText = i;
            day.onclick = () => log ? showModal(log) : null;
            cal.appendChild(day);
        }
    }

    function populatePicker() {
        const picker = document.getElementById('exSelect');
        const unique = [...new Set(logs.flatMap(l => l.exercises.map(e => e.name)))].sort();
        const current = picker.value;
        picker.innerHTML = unique.map(u => `<option value="${u}">${u}</option>`).join('');
        if (current && unique.includes(current)) picker.value = current;
        refreshChart();
    }

    function refreshChart() {
        const exName = document.getElementById('exSelect').value;
        if (!exName) return;

        const dataPoints = logs
            .filter(l => l.exercises.some(e => e.name === exName))
            .map(l => ({
                x: l.date,
                y: Math.max(...l.exercises.find(e => e.name === exName).sets.map(s => s.weight))
            }))
            .sort((a,b) => new Date(a.x) - new Date(b.x));

        // PR Detection
        const maxAllTime = Math.max(...dataPoints.map(d => d.y));
        const lastVal = dataPoints[dataPoints.length - 1]?.y;
        document.getElementById('prBadge').style.display = (lastVal === maxAllTime && dataPoints.length > 0) ? 'inline' : 'none';

        if (chartObj) chartObj.destroy();
        chartObj = new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: dataPoints.map(d => d.x),
                datasets: [{
                    label: 'Max Weight',
                    data: dataPoints.map(d => d.y),
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { ticks: { color: '#a1a1aa' }, grid: { display: false } },
                    y: { ticks: { color: '#a1a1aa' }, grid: { color: '#232326' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // --- Modal & Tooling ---
    function showModal(log) {
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        
        let html = `<h2 style="color:var(--text)">Session: ${log.date}</h2>`;
        log.exercises.forEach(ex => {
            const top = Math.max(...ex.sets.map(s => s.weight));
            html += `<div style="margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">
                <div style="font-weight:bold; color:var(--accent)">${ex.name}</div>
                <div style="font-size:0.85rem; color:var(--dim)">Top Set: ${top} | Total Sets: ${ex.sets.length}</div>
            </div>`;
        });
        html += `<button class="btn btn-ghost" style="width:100%" onclick="closeModal()">Close</button>`;
        
        content.innerHTML = html;
        overlay.style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function toggleConsole() {
        const body = document.getElementById('consoleBody');
        const toggle = document.getElementById('consoleToggle');
        const isOpen = body.classList.toggle('open');
        toggle.innerText = isOpen ? '-' : '+';
    }

    function triggerToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.transform = 'translateX(0)';
        setTimeout(() => t.style.transform = 'translateX(200%)', 3000);
    }

    function exportJSON() {
        const data = JSON.stringify(logs);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'forge_backup.json';
        a.click();
    }

    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            logs = JSON.parse(event.target.result);
            save();
            triggerToast("Backup Restored");
        };
        reader.readAsText(e.target.files[0]);
    }

    init();
</script>
</body>
</html>
