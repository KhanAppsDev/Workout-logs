<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)">
<title>Workout Tracker</title>
<style>
  /* ============ RESET & BASE ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Light theme (default) — all colors go through CSS vars so dark-mode override is one block */
:root {
color-scheme: light dark;              /* Tell the UA our inputs support both schemes */
–bg: #f5f7fb;
–surface: #ffffff;
–surface-2: #eef2f7;
–surface-3: #e4e9f1;
–border: #cbd5e1;                     /* Bumped contrast vs prior #e2e8f0 */
–border-strong: #94a3b8;
–text: #0b1020;                       /* Darker for WCAG AA on white */
–text-muted: #475569;                 /* Darker muted for readability */
–primary: #4338ca;                    /* Deeper indigo: AA on white */
–primary-hover: #3730a3;
–primary-contrast: #ffffff;
–primary-soft: #e0e7ff;
–primary-soft-text: #312e81;
–danger: #b91c1c;
–danger-soft: #fee2e2;
–danger-contrast: #ffffff;
–success: #047857;
–shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
–shadow-md: 0 4px 14px rgba(15, 23, 42, 0.10);
–radius: 12px;
–radius-sm: 8px;
–tap: 48px;                           /* Bumped from 44px for easier hit targets */
–focus-ring: 0 0 0 3px rgba(67, 56, 202, 0.35);
}

/* Dark theme — auto-activates via OS preference */
@media (prefers-color-scheme: dark) {
:root {
–bg: #0b1020;
–surface: #151b2e;
–surface-2: #1e2540;
–surface-3: #2a3356;
–border: #3a4468;
–border-strong: #5a6590;
–text: #f1f5ff;                     /* High contrast on dark surface */
–text-muted: #9aa7c7;
–primary: #818cf8;                  /* Lighter indigo so it pops on dark */
–primary-hover: #a5b4fc;
–primary-contrast: #0b1020;
–primary-soft: #312e81;
–primary-soft-text: #e0e7ff;
–danger: #f87171;
–danger-soft: #3f1d1d;
–danger-contrast: #0b1020;
–success: #34d399;
–shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
–shadow-md: 0 4px 14px rgba(0, 0, 0, 0.5);
–focus-ring: 0 0 0 3px rgba(129, 140, 248, 0.45);
}
}

html, body {
height: 100%;
font-family: -apple-system, BlinkMacSystemFont, “Segoe UI”, Roboto, “Helvetica Neue”, Arial, sans-serif;
-webkit-font-smoothing: antialiased;
background: var(–bg);
color: var(–text);
font-size: 16px;
line-height: 1.4;
}
body {
max-width: 640px;
margin: 0 auto;
padding-bottom: 120px;
min-height: 100vh;
background: var(–bg);
}

/* Form controls: EXPLICITLY set bg + color so OS dark-mode autocolor can’t override us */
button {
font-family: inherit;
cursor: pointer;
border: none;
background: transparent;
color: var(–text);
}
input, select, textarea {
font-family: inherit;
font-size: 16px;
background: var(–surface);
color: var(–text);
border: 1px solid var(–border);
-webkit-appearance: none;
appearance: none;
}
/* Native date picker styling hints */
input[type=“date”] {
background: var(–surface);
color: var(–text);
}
/* Dark-mode: invert the native calendar icon so it’s visible on dark bg */
@media (prefers-color-scheme: dark) {
input[type=“date”]::-webkit-calendar-picker-indicator {
filter: invert(0.85);
}
}
input::placeholder { color: var(–text-muted); opacity: 1; }

/* Focus ring visible on all backgrounds */
input:focus, select:focus, textarea:focus, button:focus-visible {
outline: none;
box-shadow: var(–focus-ring);
border-color: var(–primary);
}

/* Selected text: force readable contrast regardless of device defaults */
::selection { background: var(–primary); color: var(–primary-contrast); }
::-moz-selection { background: var(–primary); color: var(–primary-contrast); }

/* ============ STICKY TOP BAR ============ */
.topbar {
position: sticky;
top: 0;
z-index: 20;
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 12px 16px 14px;
box-shadow: var(–shadow-sm);
}
.topbar-title {
font-size: 13px;
font-weight: 700;
color: var(–text-muted);
text-transform: uppercase;
letter-spacing: 0.06em;
margin-bottom: 8px;
}
.date-row {
display: flex;
gap: 8px;
align-items: center;
}
.date-input {
flex: 1;
min-height: var(–tap);
padding: 0 12px;
border-radius: var(–radius-sm);
font-weight: 600;
font-size: 16px;
}
.icon-btn {
min-width: var(–tap);
min-height: var(–tap);
border: 1px solid var(–border);
border-radius: var(–radius-sm);
background: var(–surface);
color: var(–text);
display: flex;
align-items: center;
justify-content: center;
transition: background 0.15s, transform 0.08s;
}
.icon-btn:active { background: var(–surface-2); transform: scale(0.96); }
.icon-btn svg { width: 22px; height: 22px; display: block; }

.action-row {
display: flex;
gap: 8px;
margin-top: 10px;
}
.action-btn {
flex: 1;
min-height: 44px;
border-radius: var(–radius-sm);
font-size: 14px;
font-weight: 600;
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
padding: 0 10px;
border: 1px solid var(–border);
background: var(–surface);
color: var(–text);
cursor: pointer;
}
.action-btn:active { background: var(–surface-2); }
.action-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ============ MAIN CONTENT ============ */
main { padding: 16px; }
.section-header {
font-size: 13px;
font-weight: 700;
color: var(–text-muted);
text-transform: uppercase;
letter-spacing: 0.06em;
margin: 8px 4px 10px;
display: flex;
justify-content: space-between;
align-items: center;
}

/* ============ SORENESS PROMPT ============ */
.soreness-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 14px;
margin-bottom: 16px;
box-shadow: var(–shadow-sm);
}
.soreness-question {
font-size: 15px;
font-weight: 700;
margin-bottom: 10px;
color: var(–text);
}
.soreness-sub {
font-size: 13px;
color: var(–text-muted);
font-weight: 400;
margin-top: 2px;
}
.toggle-row { display: flex; gap: 8px; }
.toggle-btn {
flex: 1;
min-height: var(–tap);
border: 1px solid var(–border);
border-radius: var(–radius-sm);
background: var(–surface);
color: var(–text);
font-weight: 600;
font-size: 15px;
transition: all 0.15s;
}
.toggle-btn.active {
background: var(–primary);
color: var(–primary-contrast);
border-color: var(–primary);
}
.soreness-areas {
margin-top: 12px;
padding-top: 12px;
border-top: 1px solid var(–border);
}
.area-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
min-height: 38px;
padding: 0 14px;
border: 1px solid var(–border);
border-radius: 19px;
background: var(–surface-2);
color: var(–text);
font-size: 14px;
font-weight: 500;
text-transform: capitalize;
}
.chip.active {
background: var(–primary);
color: var(–primary-contrast);
border-color: var(–primary);
}
.other-input {
margin-top: 10px;
width: 100%;
min-height: var(–tap);
padding: 0 12px;
border-radius: var(–radius-sm);
}

/* ============ EXERCISE LIST ============ */
.exercise-list { display: flex; flex-direction: column; gap: 12px; }
.exercise-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 14px;
box-shadow: var(–shadow-sm);
position: relative;
}
.exercise-card-header {
display: flex;
gap: 8px;
align-items: center;
margin-bottom: 10px;
}
.exercise-select {
flex: 1;
min-height: var(–tap);
padding: 0 12px;
padding-right: 32px;                   /* room for custom caret */
border-radius: var(–radius-sm);
font-weight: 600;
font-size: 15px;
/* Custom caret (SVG) so it’s visible on both themes */
background-image: url(“data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1.5L6 6.5L11 1.5' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>”);
background-repeat: no-repeat;
background-position: right 10px center;
}
@media (prefers-color-scheme: dark) {
.exercise-select {
background-image: url(“data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1.5L6 6.5L11 1.5' stroke='%239aa7c7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>”);
}
}
.delete-btn {
min-width: var(–tap);
min-height: var(–tap);
border-radius: var(–radius-sm);
background: var(–danger-soft);
color: var(–danger);
border: 1px solid transparent;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
transition: background 0.15s, transform 0.08s;
}
.delete-btn:active { transform: scale(0.94); }
.delete-btn svg { width: 22px; height: 22px; }
.custom-name-input {
width: 100%;
min-height: var(–tap);
padding: 0 12px;
border-radius: var(–radius-sm);
margin-bottom: 10px;
font-size: 15px;
}
.stats-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
margin-bottom: 10px;
}
.stat-field label {
display: block;
font-size: 11px;
font-weight: 700;
color: var(–text-muted);
text-transform: uppercase;
letter-spacing: 0.05em;
margin-bottom: 4px;
}
.stat-field input, .stat-field select {
width: 100%;
min-height: var(–tap);
padding: 0 10px;
border-radius: var(–radius-sm);
font-size: 15px;
font-weight: 600;
text-align: center;
}
/* Custom caret for the unit dropdown */
.stat-field select {
padding-right: 24px;
background-image: url(“data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1L5 5L9 1' stroke='%23475569' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>”);
background-repeat: no-repeat;
background-position: right 8px center;
}
@media (prefers-color-scheme: dark) {
.stat-field select {
background-image: url(“data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1L5 5L9 1' stroke='%239aa7c7' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>”);
}
}
/* Hide number input spinners */
input[type=“number”]::-webkit-outer-spin-button,
input[type=“number”]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type=“number”] { -moz-appearance: textfield; }

.difficulty-row { display: flex; gap: 8px; }
.diff-btn {
flex: 1;
min-height: var(–tap);
border: 1px solid var(–border);
border-radius: var(–radius-sm);
background: var(–surface-2);
color: var(–text);
font-size: 22px;
transition: all 0.15s;
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
}
.diff-btn .diff-label {
font-size: 12px;
font-weight: 600;
color: var(–text-muted);
}
.diff-btn.active {
background: var(–primary-soft);
border-color: var(–primary);
color: var(–primary-soft-text);
}
.diff-btn.active .diff-label { color: var(–primary-soft-text); }

/* ============ ADD BUTTON ============ */
.add-btn {
width: 100%;
min-height: 54px;
border-radius: var(–radius);
background: var(–primary);
color: var(–primary-contrast);
font-size: 16px;
font-weight: 700;
margin-top: 16px;
box-shadow: var(–shadow-md);
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
transition: background 0.15s, transform 0.08s;
}
.add-btn:active { background: var(–primary-hover); transform: scale(0.99); }
.add-btn svg { width: 22px; height: 22px; }

/* ============ EMPTY STATE ============ */
.empty-state {
text-align: center;
padding: 40px 20px;
color: var(–text-muted);
}
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ============ TOAST ============ */
.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%) translateY(120px);
background: var(–text);
color: var(–bg);
padding: 12px 20px;
border-radius: 24px;
font-size: 14px;
font-weight: 600;
box-shadow: var(–shadow-md);
transition: transform 0.3s ease;
z-index: 100;
max-width: 90vw;
text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.hidden { display: none !important; }

/* ============ RESPONSIVE BREAKPOINTS ============ */
@media (max-width: 600px) {
.action-btn { font-size: 13px; }
}
@media (max-width: 380px) {
main { padding: 12px; }
.topbar { padding: 10px 12px 12px; }
.stats-grid { gap: 6px; }
.stat-field input, .stat-field select { padding: 0 6px; font-size: 14px; }
.diff-btn { font-size: 20px; }
.diff-btn .diff-label { display: none; }
.action-btn svg { display: none; }         /* Show label-only at narrowest width */
}

/* ============ FOOTER ============ */
.footer {
text-align: center;
font-size: 11px;
color: var(–text-muted);
padding: 16px;
opacity: 0.7;
}

/* Reduce motion for users who prefer it */
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after {
transition: none !important;
animation: none !important;
}
}
</style>

</head>
<body>

<!-- SVG icon library (reused via <use>) -->

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-chev-left" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-chev-right" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-trash" viewBox="0 0 24 24"><path d="M4 7h16M10 11v6M14 11v6M5 7l1 13a2 2 0 002 2h8a2 2 0 002-2l1-13M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-download" viewBox="0 0 24 24"><path d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-upload" viewBox="0 0 24 24"><path d="M12 20V8m0 0l-4 4m4-4l4 4M4 4h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></symbol>
  </defs>
</svg>

<!-- ============ STICKY TOP BAR ============ -->

<header class="topbar">
  <div class="topbar-title">Workout Tracker</div>
  <div class="date-row">
    <button class="icon-btn" id="prevDayBtn" type="button" aria-label="Previous day">
      <svg aria-hidden="true"><use href="#i-chev-left"/></svg>
    </button>
    <input type="date" class="date-input" id="datePicker" aria-label="Select workout date">
    <button class="icon-btn" id="nextDayBtn" type="button" aria-label="Next day">
      <svg aria-hidden="true"><use href="#i-chev-right"/></svg>
    </button>
  </div>
  <div class="action-row">
    <button class="action-btn" id="exportBtn" type="button">
      <svg aria-hidden="true"><use href="#i-download"/></svg>
      <span>Export CSV</span>
    </button>
    <label class="action-btn" for="importInput">
      <svg aria-hidden="true"><use href="#i-upload"/></svg>
      <span>Import CSV</span>
    </label>
    <input type="file" id="importInput" accept=".csv,text/csv" class="hidden">
  </div>
</header>

<!-- ============ MAIN CONTENT ============ -->

<main>
  <section id="sorenessSection" class="hidden"></section>
  <div class="section-header">
    <span id="exerciseHeaderText">Exercises</span>
  </div>
  <div class="exercise-list" id="exerciseList"></div>
  <button class="add-btn" id="addExerciseBtn" type="button">
    <svg aria-hidden="true"><use href="#i-plus"/></svg>
    Add Exercise
  </button>
</main>

<div class="footer">v1.1.0</div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

/* ============================================================
   WORKOUT TRACKER  v1.1.0
   Data Model (localStorage key: "workoutTracker.v1"):
   {
     "YYYY-MM-DD": {
       soreness: { isSore: boolean, areas: string[] },
       exercises: [
         // Strength exercise:
         { name, type: "strength", sets, reps, weight, difficulty }
         // Cardio (run) exercise:
         { name: "Run", type: "cardio", distance, unit: "km"|"mi", duration, difficulty }
       ]
     }
   }
   `duration` is stored as minutes (number). UI collects MM:SS and converts.
   ============================================================ */

const STORAGE_KEY = 'workoutTracker.v1';
const EXERCISE_PRESETS = ['Bench Press', 'Squat', 'Deadlift', 'Overhead Press', 'Run', 'Custom'];
const SORENESS_AREAS = ['legs', 'arms', 'chest', 'back', 'shoulders', 'other'];
const DIFFICULTIES = [
  { key: 'easy',   emoji: '😄', label: 'Easy' },
  { key: 'medium', emoji: '😐', label: 'Medium' },
  { key: 'hard',   emoji: '😵', label: 'Hard' }
];

// ---------- State ----------
let state = {
  currentDate: todayISO(),
  data: {}
};

// ---------- Utilities ----------
function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 2400);
}

function shiftDate(iso, delta) {
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + delta);
  const ny = dt.getFullYear();
  const nm = String(dt.getMonth() + 1).padStart(2, '0');
  const nd = String(dt.getDate()).padStart(2, '0');
  return `${ny}-${nm}-${nd}`;
}

// Format stored duration (minutes, can be fractional) as "MM:SS" for display
function minutesToMMSS(minutes) {
  const mins = Number(minutes) || 0;
  if (mins <= 0) return '';
  const totalSec = Math.round(mins * 60);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

// Parse "MM:SS" or "MM" or decimal minutes like "30.5" -> minutes (number)
function parseDuration(str) {
  if (str == null) return 0;
  const s = String(str).trim();
  if (!s) return 0;
  if (s.includes(':')) {
    const parts = s.split(':');
    const m = Number(parts[0]) || 0;
    const sec = Number(parts[1]) || 0;
    return m + (sec / 60);
  }
  const n = Number(s);
  return isNaN(n) ? 0 : n;
}

// ---------- Storage ----------
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return (parsed && typeof parsed === 'object') ? parsed : {};
  } catch (e) {
    console.error('Failed to load storage:', e);
    return {};
  }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
  } catch (e) {
    console.error('Failed to save storage:', e);
    showToast('Could not save (storage full?)');
  }
}

function getDayEntry(iso) {
  if (!state.data[iso]) {
    state.data[iso] = {
      soreness: { isSore: false, areas: [] },
      exercises: []
    };
  }
  const entry = state.data[iso];
  if (!entry.soreness || typeof entry.soreness !== 'object') {
    entry.soreness = { isSore: false, areas: [] };
  }
  if (!Array.isArray(entry.soreness.areas)) entry.soreness.areas = [];
  if (!Array.isArray(entry.exercises)) entry.exercises = [];
  // Migrate any legacy exercises without a `type` field
  entry.exercises.forEach(ex => {
    if (!ex.type) ex.type = (ex.name === 'Run') ? 'cardio' : 'strength';
  });
  return entry;
}

function hasAnyContent(iso) {
  const e = state.data[iso];
  return !!(e && Array.isArray(e.exercises) && e.exercises.length > 0);
}

function getMostRecentPreviousWorkoutDate(iso) {
  const keys = Object.keys(state.data)
    .filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k) && k < iso && hasAnyContent(k))
    .sort();
  return keys.length ? keys[keys.length - 1] : null;
}

function pruneEmptyDate(iso) {
  const e = state.data[iso];
  if (!e) return;
  const noExercises = !e.exercises || e.exercises.length === 0;
  const noSoreness = !e.soreness || (!e.soreness.isSore && (!e.soreness.areas || e.soreness.areas.length === 0));
  if (noExercises && noSoreness) delete state.data[iso];
}

// ---------- Rendering ----------
function render() {
  renderSoreness();
  renderExercises();
  renderHeaderCount();
}

function renderHeaderCount() {
  const entry = state.data[state.currentDate];
  const count = entry && entry.exercises ? entry.exercises.length : 0;
  const el = document.getElementById('exerciseHeaderText');
  el.textContent = count === 0 ? 'Exercises' : `Exercises (${count})`;
}

function renderSoreness() {
  const section = document.getElementById('sorenessSection');
  const prevDate = getMostRecentPreviousWorkoutDate(state.currentDate);

  if (!prevDate) {
    section.classList.add('hidden');
    section.innerHTML = '';
    return;
  }

  const entry = getDayEntry(state.currentDate);
  const isSore = !!entry.soreness.isSore;
  const areas = entry.soreness.areas || [];
  const hasOther = areas.some(a => a.startsWith('other:')) || areas.includes('other');
  const otherValue = (areas.find(a => a.startsWith('other:')) || '').replace(/^other:/, '');

  section.classList.remove('hidden');
  section.innerHTML = `
    <div class="soreness-card">
      <div class="soreness-question">
        Are you sore from your last workout?
        <div class="soreness-sub">Last logged: ${escapeHtml(prevDate)}</div>
      </div>
      <div class="toggle-row">
        <button type="button" class="toggle-btn ${isSore ? 'active' : ''}" data-sore="true">Yes</button>
        <button type="button" class="toggle-btn ${!isSore ? 'active' : ''}" data-sore="false">No</button>
      </div>
      ${isSore ? `
        <div class="soreness-areas">
          <div class="area-chips">
            ${SORENESS_AREAS.map(a => {
              const active = a === 'other' ? hasOther : areas.includes(a);
              return `<button type="button" class="chip ${active ? 'active' : ''}" data-area="${escapeHtml(a)}">${escapeHtml(a)}</button>`;
            }).join('')}
          </div>
          ${hasOther ? `
            <input type="text" class="other-input" id="otherAreaInput"
                   placeholder="Describe other soreness..."
                   value="${escapeHtml(otherValue)}">
          ` : ''}
        </div>
      ` : ''}
    </div>
  `;

  section.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.sore === 'true';
      entry.soreness.isSore = val;
      if (!val) entry.soreness.areas = [];
      saveAndPrune();
      renderSoreness();
    });
  });

  section.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      toggleSorenessArea(chip.dataset.area);
      renderSoreness();
    });
  });

  const otherInput = section.querySelector('#otherAreaInput');
  if (otherInput) {
    otherInput.addEventListener('input', () => {
      const e = getDayEntry(state.currentDate);
      e.soreness.areas = e.soreness.areas.filter(a => a !== 'other' && !a.startsWith('other:'));
      const txt = otherInput.value.trim();
      e.soreness.areas.push(txt ? `other:${txt}` : 'other');
      saveAndPrune();
    });
  }
}

function toggleSorenessArea(area) {
  const entry = getDayEntry(state.currentDate);
  const areas = entry.soreness.areas;

  if (area === 'other') {
    const hasOther = areas.some(a => a === 'other' || a.startsWith('other:'));
    if (hasOther) {
      entry.soreness.areas = areas.filter(a => a !== 'other' && !a.startsWith('other:'));
    } else {
      entry.soreness.areas.push('other');
    }
  } else {
    const idx = areas.indexOf(area);
    if (idx === -1) areas.push(area);
    else areas.splice(idx, 1);
  }
  saveAndPrune();
}

function renderExercises() {
  const list = document.getElementById('exerciseList');
  const entry = state.data[state.currentDate];
  const exercises = entry ? entry.exercises : [];

  if (!exercises || exercises.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="emoji">💪</div>
        <p>No exercises logged yet.<br>Tap "Add Exercise" to start.</p>
      </div>
    `;
    return;
  }

  list.innerHTML = exercises.map((ex, idx) => renderExerciseCard(ex, idx)).join('');

  // --- Wire up all card events ---
  list.querySelectorAll('[data-action="select-exercise"]').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const idx = Number(e.target.dataset.idx);
      updateExerciseName(idx, e.target.value);
      renderExercises();
    });
  });

  list.querySelectorAll('[data-action="custom-name"]').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const idx = Number(e.target.dataset.idx);
      updateCustomName(idx, e.target.value);
    });
  });

  // Numeric stat fields (sets, reps, weight, distance)
  list.querySelectorAll('[data-action="stat"]').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const idx = Number(e.target.dataset.idx);
      const field = e.target.dataset.field;
      const num = e.target.value === '' ? 0 : Number(e.target.value);
      updateExerciseField(idx, field, isNaN(num) ? 0 : num);
    });
  });

  // Duration text field (accepts MM:SS or decimal minutes)
  list.querySelectorAll('[data-action="duration"]').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const idx = Number(e.target.dataset.idx);
      updateExerciseField(idx, 'duration', parseDuration(e.target.value));
    });
  });

  // Unit dropdown (km/mi)
  list.querySelectorAll('[data-action="unit"]').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const idx = Number(e.target.dataset.idx);
      updateExerciseField(idx, 'unit', e.target.value);
    });
  });

  list.querySelectorAll('[data-action="difficulty"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = Number(btn.dataset.idx);
      updateExerciseField(idx, 'difficulty', btn.dataset.diff);
      renderExercises();
    });
  });

  list.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => deleteExercise(Number(btn.dataset.idx)));
  });
}

function renderExerciseCard(ex, idx) {
  // Determine preset vs custom
  // "Run" is a preset but has its own field schema (cardio)
  const presetNonCustom = EXERCISE_PRESETS.slice(0, -1); // everything except "Custom"
  const isCustom = !presetNonCustom.includes(ex.name) || ex._isCustom;
  const selectValue = isCustom ? 'Custom' : ex.name;
  const customName = isCustom ? ex.name : (ex.customName || '');

  const optionsHtml = EXERCISE_PRESETS.map(name =>
    `<option value="${escapeHtml(name)}" ${selectValue === name ? 'selected' : ''}>${escapeHtml(name)}</option>`
  ).join('');

  // Branch on exercise type: cardio shows distance + unit + time; strength shows sets/reps/weight
  const isCardio = ex.type === 'cardio' || ex.name === 'Run';
  const fieldsHtml = isCardio
    ? renderCardioFields(ex, idx)
    : renderStrengthFields(ex, idx);

  return `
    <div class="exercise-card" data-idx="${idx}">
      <div class="exercise-card-header">
        <select class="exercise-select" data-action="select-exercise" data-idx="${idx}" aria-label="Exercise">
          ${optionsHtml}
        </select>
        <button type="button" class="delete-btn" data-action="delete" data-idx="${idx}" aria-label="Delete exercise">
          <svg aria-hidden="true"><use href="#i-trash"/></svg>
        </button>
      </div>

      ${isCustom ? `
        <input type="text" class="custom-name-input" data-action="custom-name" data-idx="${idx}"
               placeholder="Exercise name" value="${escapeHtml(customName)}">
      ` : ''}

      ${fieldsHtml}

      <div class="difficulty-row">
        ${DIFFICULTIES.map(d => `
          <button type="button" class="diff-btn ${ex.difficulty === d.key ? 'active' : ''}"
                  data-action="difficulty" data-diff="${d.key}" data-idx="${idx}"
                  aria-label="${d.label}">
            <span>${d.emoji}</span>
            <span class="diff-label">${d.label}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderStrengthFields(ex, idx) {
  return `
    <div class="stats-grid">
      <div class="stat-field">
        <label>Sets</label>
        <input type="number" inputmode="numeric" min="0" data-action="stat" data-field="sets" data-idx="${idx}" value="${Number(ex.sets) || 0}">
      </div>
      <div class="stat-field">
        <label>Reps</label>
        <input type="number" inputmode="numeric" min="0" data-action="stat" data-field="reps" data-idx="${idx}" value="${Number(ex.reps) || 0}">
      </div>
      <div class="stat-field">
        <label>Weight</label>
        <input type="number" inputmode="decimal" min="0" step="0.5" data-action="stat" data-field="weight" data-idx="${idx}" value="${Number(ex.weight) || 0}">
      </div>
    </div>
  `;
}

function renderCardioFields(ex, idx) {
  const unit = (ex.unit === 'mi') ? 'mi' : 'km';
  const distance = Number(ex.distance) || 0;
  const durationDisplay = minutesToMMSS(ex.duration);
  return `
    <div class="stats-grid">
      <div class="stat-field">
        <label>Distance</label>
        <input type="number" inputmode="decimal" min="0" step="0.1" data-action="stat" data-field="distance" data-idx="${idx}" value="${distance}">
      </div>
      <div class="stat-field">
        <label>Unit</label>
        <select data-action="unit" data-idx="${idx}" aria-label="Distance unit">
          <option value="km" ${unit === 'km' ? 'selected' : ''}>km</option>
          <option value="mi" ${unit === 'mi' ? 'selected' : ''}>mi</option>
        </select>
      </div>
      <div class="stat-field">
        <label>Time (mm:ss)</label>
        <input type="text" inputmode="numeric" pattern="[0-9:]*" placeholder="30:00" data-action="duration" data-idx="${idx}" value="${escapeHtml(durationDisplay)}">
      </div>
    </div>
  `;
}

// ---------- Mutations ----------
// Handle the exercise-type select dropdown changing. This is separate from
// generic field updates because switching to/from "Run" also swaps the schema.
function updateExerciseName(idx, value) {
  const entry = getDayEntry(state.currentDate);
  const ex = entry.exercises[idx];
  if (!ex) return;

  if (value === 'Custom') {
    ex._isCustom = true;
    ex.type = 'strength';
    ex.name = ex.customName || '';
    ensureStrengthShape(ex);
  } else if (value === 'Run') {
    ex._isCustom = false;
    ex.name = 'Run';
    ex.type = 'cardio';
    ensureCardioShape(ex);
  } else {
    ex._isCustom = false;
    ex.name = value;
    ex.type = 'strength';
    ensureStrengthShape(ex);
  }
  saveData();
  renderHeaderCount();
}

function updateCustomName(idx, value) {
  const entry = getDayEntry(state.currentDate);
  const ex = entry.exercises[idx];
  if (!ex) return;
  ex.customName = value;
  ex._isCustom = true;
  ex.name = value;
  saveData();
}

function updateExerciseField(idx, field, value) {
  const entry = getDayEntry(state.currentDate);
  const ex = entry.exercises[idx];
  if (!ex) return;
  ex[field] = value;
  saveData();
}

// Ensure strength shape: default counts, clear cardio fields so CSV export stays clean
function ensureStrengthShape(ex) {
  if (ex.sets == null) ex.sets = 3;
  if (ex.reps == null) ex.reps = 10;
  if (ex.weight == null) ex.weight = 0;
  delete ex.distance;
  delete ex.unit;
  delete ex.duration;
}

// Ensure cardio shape: default unit/distance/time, clear strength fields
function ensureCardioShape(ex) {
  if (ex.distance == null) ex.distance = 0;
  if (!ex.unit) ex.unit = 'km';
  if (ex.duration == null) ex.duration = 0;
  delete ex.sets;
  delete ex.reps;
  delete ex.weight;
}

function addExercise() {
  const entry = getDayEntry(state.currentDate);
  entry.exercises.push({
    name: 'Bench Press',
    type: 'strength',
    sets: 3,
    reps: 10,
    weight: 0,
    difficulty: 'medium'
  });
  saveData();
  render();
}

function deleteExercise(idx) {
  const entry = getDayEntry(state.currentDate);
  if (!entry.exercises[idx]) return;
  entry.exercises.splice(idx, 1);
  saveAndPrune();
  render();
}

function saveAndPrune() {
  pruneEmptyDate(state.currentDate);
  saveData();
}

// ---------- CSV Export ----------
function csvEscape(val) {
  const s = val == null ? '' : String(val);
  if (/[",\n\r]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}

function exportCSV() {
  // Columns now include distance/unit/duration for cardio rows.
  // Strength rows leave those blank; cardio rows leave sets/reps/weight blank.
  const headers = ['date', 'exercise', 'type', 'sets', 'reps', 'weight', 'distance', 'distance_unit', 'duration_min', 'difficulty', 'sore', 'sore_areas'];
  const rows = [headers.join(',')];

  const dates = Object.keys(state.data).sort();
  let totalRows = 0;

  for (const date of dates) {
    const entry = state.data[date];
    if (!entry) continue;
    const sore = !!(entry.soreness && entry.soreness.isSore);
    const areas = (entry.soreness && Array.isArray(entry.soreness.areas))
      ? entry.soreness.areas.join('|')
      : '';
    const exercises = Array.isArray(entry.exercises) ? entry.exercises : [];

    if (exercises.length === 0) {
      if (sore || areas) {
        rows.push([
          csvEscape(date), '', '', '', '', '', '', '', '', '',
          csvEscape(sore), csvEscape(areas)
        ].join(','));
        totalRows++;
      }
      continue;
    }

    for (const ex of exercises) {
      const isCardio = ex.type === 'cardio' || ex.name === 'Run';
      rows.push([
        csvEscape(date),
        csvEscape(ex.name || ''),
        csvEscape(isCardio ? 'cardio' : 'strength'),
        csvEscape(isCardio ? '' : (Number(ex.sets) || 0)),
        csvEscape(isCardio ? '' : (Number(ex.reps) || 0)),
        csvEscape(isCardio ? '' : (Number(ex.weight) || 0)),
        csvEscape(isCardio ? (Number(ex.distance) || 0) : ''),
        csvEscape(isCardio ? (ex.unit || 'km') : ''),
        csvEscape(isCardio ? (Number(ex.duration) || 0) : ''),
        csvEscape(ex.difficulty || ''),
        csvEscape(sore),
        csvEscape(areas)
      ].join(','));
      totalRows++;
    }
  }

  if (totalRows === 0) { showToast('No data to export'); return; }

  const csv = rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `workouts_${todayISO()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Exported ${totalRows} row${totalRows === 1 ? '' : 's'}`);
}

// ---------- CSV Import ----------
function parseCSV(text) {
  // RFC 4180-ish parser. Handles quoted fields, escaped quotes, embedded newlines.
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  let i = 0;
  const len = text.length;

  while (i < len) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += ch; i++; continue;
    }
    if (ch === '"') { inQuotes = true; i++; continue; }
    if (ch === ',') { row.push(field); field = ''; i++; continue; }
    if (ch === '\r') { i++; continue; }
    if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
    field += ch; i++;
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows.filter(r => !(r.length === 1 && r[0] === ''));
}

function importCSV(text) {
  let parsed;
  try { parsed = parseCSV(text); }
  catch (e) { showToast('Could not parse CSV'); return; }

  if (!parsed || parsed.length < 2) { showToast('CSV is empty or invalid'); return; }

  const header = parsed[0].map(h => String(h || '').trim().toLowerCase());
  const idx = (name) => header.indexOf(name);
  const iDate       = idx('date');
  const iExercise   = idx('exercise');
  const iType       = idx('type');
  const iSets       = idx('sets');
  const iReps       = idx('reps');
  const iWeight     = idx('weight');
  const iDistance   = idx('distance');
  const iUnit       = idx('distance_unit');
  const iDuration   = idx('duration_min');
  const iDifficulty = idx('difficulty');
  const iSore       = idx('sore');
  const iAreas      = idx('sore_areas');

  if (iDate === -1) { showToast('CSV missing "date" column'); return; }

  let imported = 0;
  let skipped = 0;
  const touchedDates = new Set(); // Idempotent re-import: wipe exercises on first touch

  for (let r = 1; r < parsed.length; r++) {
    const row = parsed[r];
    if (!row || row.length === 0) continue;

    const date = (row[iDate] || '').trim();
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) { skipped++; continue; }

    if (!touchedDates.has(date)) {
      touchedDates.add(date);
      const existing = state.data[date] || {};
      state.data[date] = {
        soreness: existing.soreness && typeof existing.soreness === 'object'
          ? existing.soreness
          : { isSore: false, areas: [] },
        exercises: []
      };
    }
    const entry = state.data[date];

    // Soreness — first non-empty wins per date
    if (iSore !== -1 && row[iSore] != null && String(row[iSore]).trim() !== '') {
      const v = String(row[iSore]).trim().toLowerCase();
      entry.soreness.isSore = (v === 'true' || v === '1' || v === 'yes');
    }
    if (iAreas !== -1 && row[iAreas] != null && String(row[iAreas]).trim() !== '') {
      entry.soreness.areas = String(row[iAreas]).split('|').map(s => s.trim()).filter(Boolean);
    }

    const exName = iExercise !== -1 ? (row[iExercise] || '').trim() : '';
    if (!exName) continue; // soreness-only row

    // Determine type: explicit column wins, else fall back to name
    let type = 'strength';
    if (iType !== -1 && row[iType]) {
      const t = String(row[iType]).trim().toLowerCase();
      if (t === 'cardio' || t === 'strength') type = t;
    } else if (exName.toLowerCase() === 'run') {
      type = 'cardio';
    }

    const diff = iDifficulty !== -1 ? String(row[iDifficulty] || '').trim().toLowerCase() : 'medium';
    const safeDiff = ['easy','medium','hard'].includes(diff) ? diff : 'medium';

    if (type === 'cardio') {
      const distance = iDistance !== -1 ? Number(row[iDistance]) : 0;
      const rawUnit  = iUnit !== -1 ? String(row[iUnit] || '').trim().toLowerCase() : 'km';
      const unit     = (rawUnit === 'mi') ? 'mi' : 'km';
      const duration = iDuration !== -1 ? Number(row[iDuration]) : 0;
      entry.exercises.push({
        name: exName,
        type: 'cardio',
        distance: isNaN(distance) ? 0 : distance,
        unit,
        duration: isNaN(duration) ? 0 : duration,
        difficulty: safeDiff
      });
    } else {
      const sets = iSets !== -1 ? Number(row[iSets]) : 0;
      const reps = iReps !== -1 ? Number(row[iReps]) : 0;
      const weight = iWeight !== -1 ? Number(row[iWeight]) : 0;
      entry.exercises.push({
        name: exName,
        type: 'strength',
        sets: isNaN(sets) ? 0 : sets,
        reps: isNaN(reps) ? 0 : reps,
        weight: isNaN(weight) ? 0 : weight,
        difficulty: safeDiff
      });
    }
    imported++;
  }

  saveData();
  render();
  const msg = skipped > 0
    ? `Imported ${imported} row${imported === 1 ? '' : 's'} (${skipped} skipped)`
    : `Imported ${imported} row${imported === 1 ? '' : 's'}`;
  showToast(msg);
}

// ---------- Event Wiring ----------
function initEvents() {
  const datePicker = document.getElementById('datePicker');
  datePicker.addEventListener('change', (e) => {
    const val = e.target.value;
    if (/^\d{4}-\d{2}-\d{2}$/.test(val)) {
      state.currentDate = val;
      render();
    }
  });

  document.getElementById('prevDayBtn').addEventListener('click', () => {
    state.currentDate = shiftDate(state.currentDate, -1);
    datePicker.value = state.currentDate;
    render();
  });

  document.getElementById('nextDayBtn').addEventListener('click', () => {
    state.currentDate = shiftDate(state.currentDate, 1);
    datePicker.value = state.currentDate;
    render();
  });

  document.getElementById('addExerciseBtn').addEventListener('click', addExercise);
  document.getElementById('exportBtn').addEventListener('click', exportCSV);

  const importInput = document.getElementById('importInput');
  importInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => importCSV(String(ev.target.result || ''));
    reader.onerror = () => showToast('Failed to read file');
    reader.readAsText(file);
    importInput.value = '';
  });
}

// ---------- Init ----------
function init() {
  state.data = loadData();
  state.currentDate = todayISO();
  document.getElementById('datePicker').value = state.currentDate;
  initEvents();
  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
