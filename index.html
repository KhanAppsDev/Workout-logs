<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge // Vision & Time</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0b0c; --card: #141417; --border: #232326;
            --text: #e1e1e6; --dim: #a1a1aa; --accent: #3b82f6; --gold: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 340px; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 1100px) { .dashboard { grid-template-columns: 1fr; } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        h2 { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        /* Scrollable Calendar */
        .calendar-container {
            display: flex; overflow-x: auto; gap: 20px; padding-bottom: 15px;
            scroll-snap-type: x mandatory; scrollbar-width: thin;
        }
        .calendar-month-chunk { flex: 0 0 280px; scroll-snap-align: start; }
        .month-label { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; color: var(--accent); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { 
            aspect-ratio: 1; border: 1px solid var(--border); border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem; 
            cursor: pointer; position: relative;
        }
        .cal-day.active { background: var(--accent); color: white; }
        .cal-day.has-photo::after { content: ''; position: absolute; bottom: 2px; right: 2px; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; }

        /* Timelapse Player */
        #timelapseContainer { text-align: center; }
        #timelapseFrame { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }

        /* UI elements */
        .btn { padding: 10px 16px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn-prime { background: var(--accent); color: white; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--dim); }
        textarea { width: 100%; height: 150px; background: #000; color: #00ff41; border: 1px solid var(--border); padding: 10px; font-family: monospace; border-radius: 6px; }
        
        #modalOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: var(--card); width: 95%; max-width: 450px; border-radius: 12px; padding: 25px; }
        #toast { position: fixed; top: 20px; right: 20px; background: var(--accent); color: white; padding: 10px 20px; border-radius: 8px; transform: translateX(250%); transition: 0.3s; z-index: 2000; }
    </style>
</head>
<body>

<div id="toast">Update Sent</div>
<div id="modalOverlay" onclick="closeModal()"><div class="modal" id="modalContent" onclick="event.stopPropagation()"></div></div>

<div class="dashboard">
    <main>
        <div class="card">
            <h2>Data & Image Ingestion</h2>
            <textarea id="logInput" placeholder="Paste logs or JSON here..."></textarea>
            <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
                <button class="btn btn-prime" onclick="ingest()">Save Log</button>
                <input type="file" id="imgIn" hidden onchange="uploadImage(event)">
                <button class="btn btn-ghost" onclick="document.getElementById('imgIn').click()">📷 Upload Photo</button>
                <span id="upStatus" style="font-size:0.7rem; color:var(--gold)"></span>
            </div>
        </div>

        <div class="card">
            <h2>Activity History</h2>
            <div id="calendarContainer" class="calendar-container"></div>
        </div>

        <div class="card">
            <select id="exSelect" onchange="draw()"></select>
            <div style="height:300px;"><canvas id="mainChart"></canvas></div>
        </div>
    </main>

    <aside>
        <div class="card">
            <h2>Visual Progress</h2>
            <button class="btn btn-gold" style="width:100%" onclick="startTimelapse()">▶ Play Timelapse</button>
            <div id="stats" style="margin-top:20px; font-size:0.8rem; color:var(--dim)"></div>
        </div>
        <div class="card">
            <button class="btn btn-ghost" style="width:100%" onclick="exportJSON()">Backup Database</button>
        </div>
    </aside>
</div>

<script>
    const IMGBB_KEY = 'f2b50e9be27d0a5a75ec906233a6ed6d';
    let db = JSON.parse(localStorage.getItem('forge_db_v4') || '[]');
    let chartObj = null;

    async function uploadImage(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        document.getElementById('upStatus').innerText = "Uploading...";
        const formData = new FormData();
        formData.append('image', file);

        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            const url = data.data.url;
            
            const today = new Date().toISOString().split('T')[0];
            let entry = db.find(d => d.date === today) || { date: today, exercises: [] };
            entry.photoUrl = url;
            
            db = db.filter(d => d.date !== today);
            db.push(entry);
            save();
            document.getElementById('upStatus').innerText = "Upload Success!";
            msg("Photo Synced to Cloud");
        } catch(err) {
            document.getElementById('upStatus').innerText = "Error!";
        }
    }

    function ingest() {
        const input = document.getElementById('logInput').value.trim();
        if(!input) return;
        try {
            const p = JSON.parse(input);
            (p.workouts || p).forEach(w => {
                const existing = db.find(d => d.date === w.date);
                db = db.filter(d => d.date !== w.date);
                db.push({ ...existing, ...w });
            });
        } catch(e) {
            const sections = input.split(/##\s+/).filter(s => s.trim());
            sections.forEach(sec => {
                const lines = sec.split('\n');
                const date = (lines[0].match(/(\d{4}-\d{2}-\d{2})/) || [])[1];
                if(date) {
                    let workout = db.find(d => d.date === date) || { date, exercises: [] };
                    workout.exercises = [];
                    lines.slice(1).forEach(l => {
                        const p = l.split(/[|]+/).map(i => i.trim()).filter(i => i);
                        if(p.length >= 2) {
                            const name = p[0];
                            const weight = parseFloat((p[1].match(/(\d+\.?\d*)/) || [0])[0]);
                            const reps = parseInt((p[2]?.match(/(\d+)/) || [0])[0]);
                            let ex = workout.exercises.find(e => e.name === name);
                            if(!ex) { ex = { name, sets: [] }; workout.exercises.push(ex); }
                            ex.sets.push({ weight_lb: weight, reps });
                        }
                    });
                    db = db.filter(d => d.date !== date);
                    db.push(workout);
                }
            });
        }
        save();
        document.getElementById('logInput').value = '';
    }

    function save() {
        localStorage.setItem('forge_db_v4', JSON.stringify(db));
        init();
    }

    function init() {
        renderCalendar();
        updatePicker();
        updateStats();
    }

    function renderCalendar() {
        const container = document.getElementById('calendarContainer');
        container.innerHTML = '';
        const start = new Date(2025, 0, 1);
        const end = new Date();
        let curr = new Date(start);

        while (curr <= end) {
            const month = document.createElement('div');
            month.className = 'calendar-month-chunk';
            month.innerHTML = `<div class="month-label">${curr.toLocaleString('default', { month: 'short', year: 'numeric' })}</div>`;
            const grid = document.createElement('div');
            grid.className = 'calendar-grid';
            
            const lastDay = new Date(curr.getFullYear(), curr.getMonth() + 1, 0).getDate();
            for(let i=1; i<=lastDay; i++) {
                const ds = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const log = db.find(d => d.date === ds);
                const d = document.createElement('div');
                d.className = `cal-day ${log ? 'active' : ''} ${log?.photoUrl ? 'has-photo' : ''}`;
                d.innerText = i;
                d.onclick = () => log && showLog(log);
                grid.appendChild(d);
            }
            month.appendChild(grid);
            container.appendChild(month);
            curr.setMonth(curr.getMonth() + 1);
        }
        container.scrollLeft = container.scrollWidth;
    }

    function startTimelapse() {
        const photos = db.filter(d => d.photoUrl).sort((a,b) => new Date(a.date) - new Date(b.date));
        if(!photos.length) return msg("No photos found");

        const content = document.getElementById('modalContent');
        content.innerHTML = `
            <div id="timelapseContainer">
                <div id="tlDate" style="font-weight:bold; margin-bottom:10px;"></div>
                <img id="timelapseFrame">
                <button class="btn btn-ghost" style="width:100%; margin-top:15px;" onclick="stopTimelapse()">Stop</button>
            </div>
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
        
        let i = 0;
        window.tlInterval = setInterval(() => {
            const frame = document.getElementById('timelapseFrame');
            const label = document.getElementById('tlDate');
            if(!frame) return stopTimelapse();
            
            frame.src = photos[i].photoUrl;
            label.innerText = photos[i].date;
            i = (i + 1) % photos.length;
        }, 200); // 5 frames per second
    }

    function stopTimelapse() {
        clearInterval(window.tlInterval);
        closeModal();
    }

    function showLog(log) {
        let h = `<h3 style="color:var(--accent)">${log.date}</h3>`;
        if(log.photoUrl) h += `<img src="${log.photoUrl}" style="width:100%; border-radius:8px; margin:10px 0;">`;
        log.exercises.forEach(ex => {
            h += `<div style="font-size:0.85rem; margin-top:10px;"><b>${ex.name}</b>: ${ex.sets.map(s => `${s.weight_lb || s.weight_kg || 'BW'}x${s.reps}`).join(', ')}</div>`;
        });
        h += `<button class="btn btn-ghost" style="width:100%; margin-top:20px;" onclick="closeModal()">Close</button>`;
        document.getElementById('modalContent').innerHTML = h;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function draw() {
        const name = document.getElementById('exSelect').value;
        if(!name) return;
        const pts = db.filter(l => l.exercises.some(e => e.name === name))
            .map(l => ({ x: l.date, y: Math.max(...l.exercises.find(e => e.name === name).sets.map(s => s.weight_lb || s.weight_kg || 0)) }))
            .sort((a,b) => new Date(a.x) - new Date(b.x));
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(document.getElementById('mainChart'), {
            type: 'line', data: { labels: pts.map(p => p.x), datasets: [{ data: pts.map(p => p.y), borderColor: '#3b82f6', tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function updatePicker() {
        const sel = document.getElementById('exSelect');
        const unique = [...new Set(db.flatMap(l => l.exercises.map(e => e.name)))].sort();
        sel.innerHTML = unique.map(u => `<option value="${u}">${u}</option>`).join('');
        draw();
    }
    function updateStats() { document.getElementById('stats').innerText = `Total Sessions: ${db.length} | Photos: ${db.filter(d => d.photoUrl).length}`; }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; clearInterval(window.tlInterval); }
    function msg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.transform = 'translateX(0)'; setTimeout(() => t.style.transform = 'translateX(250%)', 3000); }
    function exportJSON() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type:'application/json'})); a.download = 'forge_v4.json'; a.click(); }

    init();
</script>
</body>
</html>
