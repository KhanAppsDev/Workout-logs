<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge // Universal Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0b0c; --card: #141417; --border: #232326;
            --text: #e1e1e6; --dim: #a1a1aa; --accent: #3b82f6; --gold: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        .dashboard { display: grid; grid-template-columns: 1fr 340px; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 1000px) { .dashboard { grid-template-columns: 1fr; } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        h2 { font-size: 0.8rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* Collapsible Console */
        .console-header { cursor: pointer; background: var(--border); padding: 12px 20px; border-radius: 8px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .console-header:hover { background: #2d2d33; }
        .console-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .console-body.open { max-height: 800px; padding: 20px 0; }
        
        textarea { width: 100%; height: 250px; background: #000; color: #00ff41; border: 1px solid var(--border); padding: 15px; font-family: 'Fira Code', monospace; font-size: 0.8rem; border-radius: 6px; outline: none; }
        
        /* Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .cal-day.active { background: var(--accent); color: white; font-weight: bold; box-shadow: 0 0 12px rgba(59, 130, 246, 0.3); }
        .cal-day:hover { background: #1e1e22; }

        /* UI Elements */
        .btn { padding: 10px 20px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn-prime { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
        select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: var(--text); border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        
        /* Modal */
        #modalOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal { background: var(--card); width: 95%; max-width: 500px; border-radius: 16px; border: 1px solid var(--border); padding: 25px; max-height: 90vh; overflow-y: auto; }
        
        .pr-tag { color: var(--gold); font-size: 0.7rem; font-weight: bold; }
        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; padding: 12px 24px; border-radius: 8px; transform: translateY(200%); transition: 0.3s; z-index: 1100; }
    </style>
</head>
<body>

<div id="toast">Database Synced</div>
<div id="modalOverlay" onclick="closeModal()"><div class="modal" id="modalContent" onclick="event.stopPropagation()"></div></div>

<div class="dashboard">
    <main>
        <div class="card">
            <div class="console-header" onclick="toggleConsole()">
                <span>> SYSTEM INGESTION (TEXT OR JSON)</span>
                <span id="cToggle">+</span>
            </div>
            <div class="console-body" id="cBody">
                <textarea id="logInput" placeholder="Paste JSON array or plaintext history..."></textarea>
                <div style="margin-top:15px; display:flex; gap:10px;">
                    <button class="btn btn-prime" onclick="ingestData()">Ingest Data</button>
                    <button class="btn btn-ghost" onclick="toggleConsole()">Close</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Progress Visualizer <span id="prBadge" style="display:none" class="pr-tag">🏆 ALL-TIME BEST</span></h2>
            <select id="exSelect" onchange="drawChart()"></select>
            <div style="height:350px;"><canvas id="mainChart"></canvas></div>
        </div>
    </main>

    <aside>
        <div class="card">
            <h2>Activity Map</h2>
            <div id="calendar" class="calendar-grid"></div>
        </div>

        <div class="card">
            <h2>Records & Export</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn btn-ghost" style="flex:1" onclick="exportData()">Export</button>
                <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('fileIn').click()">Import</button>
            </div>
            <input type="file" id="fileIn" hidden onchange="importData(event)">
            <div id="quickStats" style="font-size:0.8rem; color:var(--dim)"></div>
        </div>
    </aside>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('forge_universal_db') || '[]');
    let chart = null;

    function ingestData() {
        const input = document.getElementById('logInput').value.trim();
        if(!input) return;

        try {
            const parsed = JSON.parse(input);
            const newWorkouts = parsed.workouts || (Array.isArray(parsed) ? parsed : [parsed]);
            newWorkouts.forEach(nw => {
                db = db.filter(item => item.date !== nw.date);
                db.push(nw);
            });
            showToast(`Loaded ${newWorkouts.length} JSON entries`);
        } catch(e) {
            // Text Fallback
            const sections = input.split(/##\s+/).filter(s => s.trim());
            sections.forEach(sec => {
                const lines = sec.split('\n');
                const date = (lines[0].match(/(\d{4}-\d{2}-\d{2})/) || [])[1];
                if(date) {
                    const workout = { date, exercises: [] };
                    lines.slice(1).forEach(l => {
                        const p = l.split(/[|]+/).map(i => i.trim()).filter(i => i);
                        if(p.length >= 2) {
                            const name = p[0];
                            const weight = parseFloat((p[1].match(/(\d+\.?\d*)/) || [0])[0]);
                            const reps = parseInt((p[2]?.match(/(\d+)/) || [0])[0]);
                            let ex = workout.exercises.find(e => e.name === name);
                            if(!ex) { ex = { name, sets: [] }; workout.exercises.push(ex); }
                            ex.sets.push({ weight_lb: weight, reps });
                        }
                    });
                    db = db.filter(item => item.date !== date);
                    db.push(workout);
                }
            });
            showToast("Parsed plaintext entries");
        }
        save();
        toggleConsole();
        document.getElementById('logInput').value = '';
    }

    function save() {
        localStorage.setItem('forge_universal_db', JSON.stringify(db));
        init();
    }

    function init() {
        renderCalendar();
        updatePicker();
        updateStats();
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar'); cal.innerHTML = '';
        const now = new Date();
        const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        for (let i = 1; i <= days; i++) {
            const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const log = db.find(l => l.date === ds);
            const el = document.createElement('div');
            el.className = `cal-day ${log ? 'active' : ''}`;
            el.innerText = i;
            el.onclick = () => log && showDay(log);
            cal.appendChild(el);
        }
    }

    function showDay(log) {
        let h = `<h2 style="color:#fff; margin-bottom:20px;">${log.date}</h2>`;
        log.exercises.forEach(ex => {
            h += `<div style="margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">
                <div style="font-weight:bold; color:var(--accent)">${ex.name}</div>
                <div style="font-size:0.85rem;">${ex.sets.map(s => `${s.weight_lb || s.weight_kg || 'BW'} x ${s.reps || s.distance_miles || s.distance_mile}`).join(' • ')}</div>
            </div>`;
        });
        if(log.notes) h += `<p style="font-size:0.8rem; color:var(--dim)">Note: ${log.notes}</p>`;
        h += `<button class="btn btn-ghost" style="width:100%; margin-top:10px;" onclick="closeModal()">Close</button>`;
        document.getElementById('modalContent').innerHTML = h;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function updatePicker() {
        const sel = document.getElementById('exSelect');
        const unique = [...new Set(db.flatMap(l => l.exercises.map(e => e.name)))].sort();
        const curr = sel.value;
        sel.innerHTML = unique.map(u => `<option value="${u}">${u}</option>`).join('');
        if(curr && unique.includes(curr)) sel.value = curr;
        drawChart();
    }

    function drawChart() {
        const name = document.getElementById('exSelect').value;
        if(!name) return;
        const data = db.filter(l => l.exercises.some(e => e.name === name))
            .map(l => ({
                x: l.date,
                y: Math.max(...l.exercises.find(e => e.name === name).sets.map(s => s.weight_lb || s.weight_kg || 0))
            })).sort((a,b) => new Date(a.x) - new Date(b.x));

        const max = Math.max(...data.map(d => d.y));
        document.getElementById('prBadge').style.display = (data.length && data[data.length-1].y === max && max > 0) ? 'block' : 'none';

        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: { labels: data.map(d => d.x), datasets: [{ data: data.map(d => d.y), borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, 
            scales: { x: { ticks: { color: '#a1a1aa' }, grid: { display: false } }, y: { ticks: { color: '#a1a1aa' }, grid: { color: '#232326' } } } }
        });
    }

    function updateStats() {
        const totalVol = db.reduce((a, l) => a + l.exercises.reduce((ea, e) => ea + e.sets.reduce((sa, s) => sa + ((s.weight_lb || s.weight_kg || 0) * (s.reps || 0)), 0), 0), 0);
        document.getElementById('quickStats').innerHTML = `
            <div style="display:flex; justify-content:space-between"><span>Sessions:</span> <b>${db.length}</b></div>
            <div style="display:flex; justify-content:space-between"><span>Estimated Vol:</span> <b>${totalVol.toLocaleString()}</b></div>
        `;
    }

    function toggleConsole() { const b = document.getElementById('cBody'); b.classList.toggle('open'); document.getElementById('cToggle').innerText = b.classList.contains('open') ? '-' : '+'; }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.transform = 'translateY(-100px)'; setTimeout(() => t.style.transform = 'translateY(200%)', 3000); }
    function exportData() { const blob = new Blob([JSON.stringify({workouts: db}, null, 2)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'workout_history.json'; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = (ev) => { const p = JSON.parse(ev.target.result); db = p.workouts || p; save(); }; r.readAsText(e.target.files[0]); }

    init();
</script>
</body>
</html>
